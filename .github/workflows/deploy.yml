name: Deploy Backdoor Sniper to Cloudflare

on:
  workflow_dispatch: # manual run from the Actions tab
  push:
    branches: [main]

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Put local CLI tools on PATH
        run: echo "PATH=$PWD/node_modules/.bin:$PATH" >> "$GITHUB_ENV"

      - name: Configure Cloudflare auth
        run: echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> "$GITHUB_ENV"

      # Idempotent: creates the DB only if it doesn't exist yet. The database_id
      # is already committed in wrangler.toml, so a "already exists" error is fine.
      - name: Ensure D1 database exists
        continue-on-error: true
        run: wrangler d1 create backdoor-sniper

      - name: Apply D1 schema migration
        run: wrangler d1 execute backdoor-sniper --remote --file=./migrations/0001_init.sql

      - name: Build for Cloudflare (OpenNext)
        run: bun run cf:build

      - name: Deploy to Cloudflare Pages
        run: bunx opennextjs-cloudflare deploy
